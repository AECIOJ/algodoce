<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light" class="{% if request.endpoint and (request.endpoint.endswith('.list') or request.endpoint == 'orders.orcamentos') %}list-page{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='icons/favicon.ico') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">
  <title>ALGODOCE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="{{ url_for('static', filename='css/style.css') }}?v=10" rel="stylesheet">
  <style>
    .navbar-nav .nav-link.active { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .bar-link-lg { padding: 0.25rem 0.5rem !important; border-radius: 6px; transition: background 0.15s; }
    .bar-link-lg:hover { background: rgba(233,30,99,0.08); }
    .bar-link-lg.active { background: rgba(233,30,99,0.2); color: #880e4f !important; font-weight: 700; }
  </style>
</head>
<body>
  {% include "components/sys_panel_top.html" %}

  <div id="top-spacer"></div>
  <script>(function(){var s=document.getElementById('top-spacer'),f=document.getElementById('top-fixed');if(!s||!f)return;function ajustar(){var h=f.offsetHeight;if(h>0)s.style.height=h+'px';}ajustar();window.addEventListener('load',ajustar);if(window.ResizeObserver)new ResizeObserver(ajustar).observe(f);setTimeout(ajustar,1e3);})();</script>

  <main class="container mb-5">
    {% include "components/sys_barra_msg.html" %}
    {% block content %}{% endblock %}
  </main>

  {% include "components/sys_panel_bottom.html" %}
  {% include "components/sys_modals.html" %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  {% include "components/sys_nav_js.html" %}
  {% block scripts %}{% endblock %}
</body>
</html>
