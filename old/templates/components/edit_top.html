{% macro edit_top(back_url=none, title='', actions='') %}
<div class="edit-top px-2 py-1 d-flex align-items-center gap-2">
  {% if back_url %}
  <a href="{{ back_url }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  {% endif %}
  <span class="nav-title flex-grow-1">{{ title }}</span>
  {% if actions %}
  <div class="d-flex align-items-center gap-1">
    {{ actions|safe }}
  </div>
  {% endif %}
</div>
{% endmacro %}
