services:
  db:
    container_name: algodoce_db
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5435:5432"
    volumes:
      - ./dados/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal
      - proxy

  app:
    container_name: algodoce
    restart: unless-stopped
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./dados/uploads:/app/dados/uploads
      - .:/app
    depends_on:
      - db
    networks:
      - internal
      - proxy

  cloudflare:
    container_name: algodoce_cloudflare
    build:
      context: .
      dockerfile: Dockerfile.cloudflare
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
  proxy:
    external: true
