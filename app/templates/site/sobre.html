{% extends "components/page_site.html" %}
{% block content %}
<div class="row justify-content-center mt-0 mt-sm-4">
  <div class="col-lg-8">
    <div class="card shadow-sm border-0 p-2 p-sm-4 pagina-conteudo">
      {{ content|safe }}
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<style>
.pagina-conteudo img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  margin: 1rem 0;
}
.pagina-conteudo h2 { color: var(--rosa); margin-top: 1.5rem; }
.pagina-conteudo h3 { color: var(--verde-menta); }
.pagina-conteudo hr { margin: 1.5rem 0; }
.pagina-conteudo .destaques {
  display: flex; gap: 2rem; justify-content: center;
  text-align: center; margin-top: 1.5rem; flex-wrap: wrap;
}
.pagina-conteudo .destaques h3 { color: var(--verde-menta); font-size: 2rem; margin-bottom: 0; }
.pagina-conteudo .destaques p { color: #6c757d; font-size: 0.85rem; }
</style>
{% endblock %}
