{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Categorias</h2>
  <a href="{{ url_for('categories.new') }}" class="btn btn-primary">Nova</a>
</div>

<div class="table-responsive table-scroll">
  <table class="table table-hover sortable">
    <thead>
      <tr>
        <th>#</th>
        <th>Nome</th>
        <th>Ordem</th>
        <th>Ativo</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for cat in categorias %}
        <tr>
          <td>{{ cat.id }}</td>
          <td>{{ cat.nome }}</td>
          <td>{{ cat.ordem }}</td>
          <td>
            {% if cat.ativo %}
              <span class="badge bg-success">Sim</span>
            {% else %}
              <span class="badge bg-light text-muted border">Não</span>
            {% endif %}
          </td>
          <td>
            <a href="{{ url_for('categories.edit', id=cat.id) }}" class="btn btn-sm btn-outline-primary">Editar</a>
          </td>
        </tr>
      {% else %}
        <tr>
          <td colspan="5" class="text-center text-muted">Nenhuma categoria cadastrada.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
