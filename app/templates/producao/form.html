{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-2">
  <h3 class="mb-0">Nova Produção</h3>
  <a href="{{ url_for('producao.list') }}" class="btn btn-sm btn-outline-secondary">Voltar</a>
</div>

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Descrição</label>
    <input type="text" name="descricao" class="form-control" required>
  </div>
  <div class="row mb-3">
    <div class="col">
      <label class="form-label">Previsão de</label>
      <input type="date" name="previsao_de" class="form-control" required>
    </div>
    <div class="col">
      <label class="form-label">Previsão até</label>
      <input type="date" name="previsao_ate" class="form-control" required>
    </div>
  </div>
  <p class="text-muted small">
    Serão incluídos automaticamente todos os pedidos pendentes com previsão de entrega no período informado.
  </p>
  <button type="submit" class="btn btn-primary">Criar Produção</button>
</form>
{% endblock %}
