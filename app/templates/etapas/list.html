{% extends "base.html" %}
{% block cadastro_toolbar %}
<a href="{{ url_for('etapas.new') }}" class="btn btn-sm btn-primary ms-auto">Nova</a>
{% endblock %}
{% block content %}

<div class="d-none d-lg-flex justify-content-center align-items-center mb-3 gap-2">
  <div class="d-flex align-items-center gap-2">
    <h2 class="mb-0">Etapas</h2>
  </div>
  <a href="{{ url_for('etapas.new') }}" class="btn btn-primary">Nova</a>
</div>

<div class="table-responsive table-scroll">
  <table class="table table-hover sortable">
    <thead>
      <tr>
        <th>#</th>
        <th>Nome</th>
        <th>Ordem</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for et in etapas %}
        <tr>
          <td>{{ et.id|fmtid }}</td>
          <td>{{ et.nome }}</td>
          <td>{{ et.ordem }}</td>
          <td>
            <a href="{{ url_for('etapas.edit', id=et.id) }}" class="btn btn-sm btn-outline-primary">Editar</a>
          </td>
        </tr>
      {% else %}
        <tr>
          <td colspan="4" class="text-center text-muted">Nenhuma etapa cadastrada.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
