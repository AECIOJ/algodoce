{% macro barra_report() %}
<div class="barra-report" id="barra-report">
  <div class="form-bottom-bar barra-report-bar d-flex align-items-center gap-2 px-3 py-2" style="border-top:2px solid var(--cor-menu);background:#fff;cursor:pointer" onclick="toggleReport()">
    <div class="flex-grow-1" id="barra-report-summary">
      {{ caller() }}
    </div>
    <img src="{{ url_for('static', filename='icons/panel-up.png') }}" height="20" id="barra-report-icon">
  </div>
  <div class="barra-report-panel" id="barra-report-panel" style="display:none;background:#fff;overflow:auto;">
  </div>
</div>

<script>
var reportExpanded = false;
function toggleReport() {
  reportExpanded = !reportExpanded;
  var panel = document.getElementById('barra-report-panel');
  var icon = document.getElementById('barra-report-icon');
  if (reportExpanded) {
    var sticky = document.getElementById('top-fixed') || document.querySelector('.sistema-header');
    var topOffset = sticky ? sticky.offsetHeight : 56;
    panel.style.display = 'block';
    icon.src = '{{ url_for("static", filename="icons/panel-down.png") }}';
    panel.style.position = 'fixed';
    panel.style.bottom = '46px';
    panel.style.left = '0';
    panel.style.right = '0';
    panel.style.top = topOffset + 'px';
    panel.style.zIndex = '1015';
  } else {
    panel.style.display = 'none';
    icon.src = '{{ url_for("static", filename="icons/panel-up.png") }}';
    panel.style.position = 'static';
    panel.style.top = 'auto';
    panel.style.bottom = 'auto';
    panel.style.left = 'auto';
    panel.style.right = 'auto';
    panel.style.zIndex = 'auto';
  }
}
</script>
{% endmacro %}
