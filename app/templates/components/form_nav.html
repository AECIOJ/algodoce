{% macro form_nav(back_url, nome, nav, edit_endpoint, entity_id=none) %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <a href="{{ back_url }}" class="btn btn-outline-secondary btn-sm">&larr; Voltar</a>
  <div class="text-center">
    <div class="btn-group btn-group-sm" role="group">
      <a href="{{ url_for(edit_endpoint, id=nav.first_id) }}" class="btn btn-outline-secondary" title="Primeiro">&laquo;&laquo;</a>
      {% if nav.prev_id %}
        <a href="{{ url_for(edit_endpoint, id=nav.prev_id) }}" class="btn btn-outline-secondary" title="Anterior">&laquo;</a>
      {% else %}
        <a class="btn btn-outline-secondary disabled" title="Anterior">&laquo;</a>
      {% endif %}
    </div>
    <span class="mx-2 small text-muted">{{ nome }}{% if entity_id is not none %} ({{ entity_id }}){% endif %}</span>
    <div class="btn-group btn-group-sm" role="group">
      {% if nav.next_id %}
        <a href="{{ url_for(edit_endpoint, id=nav.next_id) }}" class="btn btn-outline-secondary" title="Próximo">&raquo;</a>
      {% else %}
        <a class="btn btn-outline-secondary disabled" title="Próximo">&raquo;</a>
      {% endif %}
      <a href="{{ url_for(edit_endpoint, id=nav.last_id) }}" class="btn btn-outline-secondary" title="Último">&raquo;&raquo;</a>
    </div>
  </div>
  <div>
    {{ caller() }}
  </div>
</div>
{% endmacro %}
