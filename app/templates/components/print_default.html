{% extends "components/page_sys.html" %}
{% block modals %}{% endblock %}
{% block head_extra %}
<style>html,body{overflow:hidden!important}</style>
{% endblock %}
{% block content %}
<div class="d-flex justify-content-end gap-2 mb-2 no-print">
  <button onclick="shareOrPrint()" class="btn btn-outline-primary btn-sm d-inline-flex align-items-center gap-1">
    <i class="bi bi-send"></i> Enviar
  </button>
  <a href="#" onclick="var ref=document.referrer||'{{ fallback_url }}';window.location.href=ref;" class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center gap-1"><i class="bi bi-arrow-left"></i> Voltar</a>
</div>
<iframe id="pdf-frame" src="{{ pdf_url }}" style="width:100%;border:none;"></iframe>
<script>
function fitFrame(){
  var f=document.getElementById('pdf-frame');
  if(!f)return;
  var r=f.getBoundingClientRect();
  f.style.height=Math.max(200,window.innerHeight-r.top)+'px';
}
window.addEventListener('load',fitFrame);
window.addEventListener('resize',fitFrame);
fitFrame();

async function shareOrPrint(){
  var f=document.getElementById('pdf-frame');
  if(!f)return;
  if(navigator.share&&navigator.canShare){
    try{
      var r=await fetch(f.getAttribute('src'));
      var b=await r.blob();
      var file=new File([b],'documento.pdf',{type:'application/pdf'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file]});
        return;
      }
    }catch(e){}
  }
  f.contentWindow.print();
}
</script>
{% endblock %}
