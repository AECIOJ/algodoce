{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Ingredientes</h2>
  <a href="{{ url_for('ingredients.new') }}" class="btn btn-primary">Novo Ingrediente</a>
</div>

<div class="table-responsive">
  <table class="table table-hover sortable">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Unidade de Medida</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for i in ingredients %}
        <tr>
          <td>{{ i.nome }} ({{ i.id }})</td>
          <td>{{ i.unidade_medida }}</td>
          <td>
            <a href="{{ url_for('ingredients.edit', id=i.id) }}" class="btn btn-sm btn-outline-primary">Editar</a>
          </td>
        </tr>
      {% else %}
        <tr>
          <td colspan="3" class="text-center text-muted">Nenhum ingrediente cadastrado.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
