{% extends "components/page_sys.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-4" style="color: #e91e63;">
          🔒 Segurança
        </h4>
        <p class="text-muted text-center small mb-4">
          Informe a senha de segurança para acessar as configurações.
        </p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-danger w-100">Acessar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
