services:
  web:
    restart: unless-stopped
    build: .
    ports:
      - "5010:5000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  ngrok:
    restart: unless-stopped
    image: ngrok/ngrok:latest
    env_file:
      - .env
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTH_TOKEN}
    command: http web:5000
    depends_on:
      - web
    profiles:
      - tunnel

  db:
    restart: unless-stopped
    image: postgres:15
    environment:
      POSTGRES_DB: algodoce
      POSTGRES_USER: algodoce
      POSTGRES_PASSWORD: algodoce123
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algodoce -d algodoce"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
